# .github/workflows/ci.yml
name: Quantitative Optimization & CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  static-analysis:
    name: Lint & Compliance Verification
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linting Tooling
        run: pip install ruff

      - name: Execute Ruff Validation Gates
        run: ruff check .

  integration-testing:
    name: MDP Rollout Integration Tests
    needs: static-analysis
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      # Infrastructure Protocol: Sync system clock to preserve time-series temporal boundaries
      - name: Standardize Runner Timezone to UTC
        run: sudo timedatectl set-timezone UTC

      - name: Install Determinstic Environment Packages
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Execute Recurrent PPO Integration Smoke Test
        run: python models/test_integration.py